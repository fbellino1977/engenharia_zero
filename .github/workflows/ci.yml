name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Setting environment variables so that all job steps can see them
    env:
      SECRET_KEY: "4E9fP_XbixUiYqLs2mrcXBjImu4WMiBJlTYhvmIrE5g"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      DATABASE_URL: "sqlite:///./test.db"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint with Ruff (Static Analysis)
        run: uv run ruff check .

      - name: Check formatting with Ruff (Style)
        run: uv run ruff format --check .

      - name: Run Migrations
        run: uv run alembic upgrade head
        env:
          PYTHONPATH: src # Here it informs that 'src' is the root directory of the modules
          DATABASE_URL: "sqlite:///./test.db" # Ensures the test database has a URL
      
      - name: Run unit tests with Pytest
        run: PYTHONPATH=src uv run pytest